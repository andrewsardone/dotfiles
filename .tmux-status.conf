# tmux status line — Nord palette, powerline left, flat right, Nerd Font icons

# ── Global status bar ────────────────────────────────────────────────
set -g status on
set -g status-position bottom
set -g status-justify left
set -g status-interval 15
set -g status-style "bg=#2E3440"
set -g status-left-length 60
set -g status-right-length 90

# ── Messages ─────────────────────────────────────────────────────────
set -g message-style "fg=#ECEFF4,bg=#5E81AC"
set -g message-command-style "fg=#ECEFF4,bg=#5E81AC"

# ── Pane borders ─────────────────────────────────────────────────────
set -g pane-border-style "fg=#3B4252"
set -g pane-active-border-style "fg=#88C0D0"
set -g pane-border-lines heavy
set -g pane-border-status top
set -g pane-border-format "#{?pane_active,#[fg=#EBCB8B bold] ▶ #[fg=#E5E9F0]#{?#{==:#{pane_title},#{host}},#{pane_current_command},#{pane_title}} #[fg=#4C566A]#{pane_current_path} ,#[fg=#4C566A]   #{?#{==:#{pane_title},#{host}},#{pane_current_command},#{pane_title}} }"

# ── Pane dimming ─────────────────────────────────────────────────────
set -g window-style 'bg=#111111'
set -g window-active-style 'bg=#111111'

# ── Status left (powerline flow) ─────────────────────────────────────
set -g status-left "\
#[fg=#3B4252,bg=#88C0D0,bold]  #S \
#[fg=#88C0D0,bg=#81A1C1,nobold,nounderscore,noitalics]#[fg=#3B4252,bg=#81A1C1] #(hostname -s) \
#(if [ -n \"$SSH_CLIENT\" ]; then echo \"#[fg=#81A1C1,bg=#5E81AC]#[fg=#ECEFF4,bg=#5E81AC]  ssh #[fg=#5E81AC,bg=#2E3440]\"; else echo \"#[fg=#81A1C1,bg=#2E3440]\"; fi)"

# ── Status right (powerline flow ←) ──────────────────────────────────
#   clock  date
set -g status-right "\
#[fg=#88C0D0,bg=#2E3440]\
#[fg=#3B4252,bg=#88C0D0] %H:%M \
#[fg=#81A1C1,bg=#88C0D0]\
#[fg=#3B4252,bg=#81A1C1] %d %b "

# ── Window status (powerline arrows) ─────────────────────────────────
setw -g window-status-separator ""
setw -g monitor-activity on
setw -g monitor-bell on

# Inactive:   #I  #W
setw -g window-status-format "\
#[fg=#2E3440,bg=#4C566A,nobold,nounderscore,noitalics]\
#[fg=#D8DEE9,bg=#4C566A] #I  #W \
#[fg=#4C566A,bg=#2E3440,nobold,nounderscore,noitalics] "

# Active:   #I  #W   (frost cyan block, bold)
setw -g window-status-current-format "\
#[fg=#4C566A,bg=#81A1C1,nobold,nounderscore,noitalics]\
#[fg=#3B4252,bg=#81A1C1,bold] #I  #W \
#[fg=#81A1C1,bg=#2E3440,nobold,nounderscore,noitalics] "

# ── Activity styling ─────────────────────────────────────────────────
setw -g window-status-activity-style "fg=#EBCB8B,bg=#2E3440"
setw -g window-status-bell-style "fg=#BF616A,bg=#2E3440"

# ── SSH remote theme override (warm palette) ─────────────────────────
if-shell '[ -n "$SSH_CLIENT" ]' {
    set -g status-style "bg=#3B2E2E"
    set -g message-style "fg=#ECEFF4,bg=#BF616A"
    set -g message-command-style "fg=#ECEFF4,bg=#BF616A"
    set -g pane-active-border-style "fg=#D08770"

    set -g status-left "\
#[fg=#3B2E2E,bg=#D08770,bold]  #S \
#[fg=#D08770,bg=#BF616A,nobold]#[fg=#ECEFF4,bg=#BF616A] #(hostname -s) \
#[fg=#BF616A,bg=#A3BE8C]#[fg=#3B2E2E,bg=#A3BE8C]  ssh \
#[fg=#A3BE8C,bg=#3B2E2E]"

    set -g status-right "\
#[fg=#D08770,bg=#3B2E2E]\
#[fg=#3B2E2E,bg=#D08770] %H:%M \
#[fg=#BF616A,bg=#D08770]\
#[fg=#ECEFF4,bg=#BF616A] %d %b "

    setw -g window-status-format "\
#[fg=#3B2E2E,bg=#4C3A3A]#[fg=#D8DEE9,bg=#4C3A3A] #I  #W #[fg=#4C3A3A,bg=#3B2E2E] "

    setw -g window-status-current-format "\
#[fg=#4C3A3A,bg=#D08770]#[fg=#3B2E2E,bg=#D08770,bold] #I  #W #[fg=#D08770,bg=#3B2E2E] "
}
