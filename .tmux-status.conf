# tmux status line вЂ” Nord palette, powerline left, flat right, Nerd Font icons

# в”Ђв”Ђ Global status bar в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
set -g status on
set -g status-position bottom
set -g status-justify left
set -g status-interval 15
set -g status-style "bg=#2E3440"
set -g status-left-length 60
set -g status-right-length 90

# в”Ђв”Ђ Messages в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
set -g message-style "fg=#ECEFF4,bg=#5E81AC"
set -g message-command-style "fg=#ECEFF4,bg=#5E81AC"

# в”Ђв”Ђ Pane borders в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
set -g pane-border-style "fg=#3B4252"
set -g pane-active-border-style "fg=#88C0D0"
set -g pane-border-lines heavy
set -g pane-border-status top
set -g pane-border-format "#{?pane_active,#[fg=#EBCB8B bold] в–¶ #[fg=#E5E9F0]#{pane_current_command} #[fg=#4C566A]#{pane_current_path} ,#[fg=#4C566A]   #{pane_current_command} }"

# в”Ђв”Ђ Pane dimming в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
set -g window-style 'bg=#1a1a1a'
set -g window-active-style 'bg=#1a1a1a'

# в”Ђв”Ђ Status left (powerline flow) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
set -g status-left "\
#[fg=#3B4252,bg=#88C0D0,bold]  #S \
#[fg=#88C0D0,bg=#81A1C1,nobold,nounderscore,noitalics]о‚°#[fg=#3B4252,bg=#81A1C1] #(hostname -s) \
#(if [ -n \"$SSH_CLIENT\" ]; then echo \"#[fg=#81A1C1,bg=#5E81AC]о‚°#[fg=#ECEFF4,bg=#5E81AC]  ssh #[fg=#5E81AC,bg=#2E3440]о‚°\"; else echo \"#[fg=#81A1C1,bg=#2E3440]о‚°\"; fi)"

# в”Ђв”Ђ Status right (powerline flow в†ђ) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
#   clock  date
set -g status-right "\
#[fg=#88C0D0,bg=#2E3440]\
#[fg=#3B4252,bg=#88C0D0] %H:%M \
#[fg=#81A1C1,bg=#88C0D0]\
#[fg=#3B4252,bg=#81A1C1] %d %b "

# в”Ђв”Ђ Window status (powerline arrows) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
setw -g window-status-separator ""
setw -g monitor-activity on
setw -g monitor-bell on

# Inactive:   #I  #W
setw -g window-status-format "\
#[fg=#2E3440,bg=#4C566A,nobold,nounderscore,noitalics]о‚°\
#[fg=#D8DEE9,bg=#4C566A] #I о‚± #W \
#[fg=#4C566A,bg=#2E3440,nobold,nounderscore,noitalics]о‚° "

# Active:   #I  #W   (frost cyan block, bold)
setw -g window-status-current-format "\
#[fg=#4C566A,bg=#81A1C1,nobold,nounderscore,noitalics]о‚°\
#[fg=#3B4252,bg=#81A1C1,bold] #I о‚± #W \
#[fg=#81A1C1,bg=#2E3440,nobold,nounderscore,noitalics]о‚° "

# в”Ђв”Ђ Activity styling в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
setw -g window-status-activity-style "fg=#EBCB8B,bg=#2E3440"
setw -g window-status-bell-style "fg=#BF616A,bg=#2E3440"
